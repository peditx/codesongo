backend:
  name: github
  repo: peditx/codesongo                # آدرس ریپازیتوری شما
  branch: main                         # شاخه اصلی
  auth_type: implicit                  # روش لاگین مستقیم با گیت‌هاب
  app_id: Ov23liMQ36VXRPwraTVC         # همان Client ID که قبلاً دادی

# مسیر ذخیره عکس‌ها و فایل‌های آپلود شده
media_folder: "public/uploads"
public_folder: "/uploads"

# تعریف محتوای قابل ویرایش (مجموعه‌ها)
collections:
  - name: "projects"
    label: "Projects"
    folder: "src/content/projects" # مسیر پروژه‌ها در این قالب
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "string" }
      - { label: "Image", name: "image", widget: "image" }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Body", name: "body", widget: "markdown" }
